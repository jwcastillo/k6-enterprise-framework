# T-140: k6 Enterprise Framework — Self-test CI pipeline
# Runs on push, PRs, and manual dispatch with input validation.
#
# Security controls:
# - Minimal permissions (contents: read only)
# - Actions pinned by SHA (not mutable tags)
# - Inputs from workflow_dispatch validated with regex before use
# - Secrets injected via GitHub Secrets, never written to files
# - detect-secrets step blocks pipeline if credentials are found in source

name: k6 Framework CI

on:
  push:
    branches:
      - main
      - "001-*"
      - "feature/*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "Load profile to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - quick
      scenario:
        description: "Scenario path (e.g. api/smoke-users)"
        required: true
        default: "api/smoke-users"

# Minimal permissions — read repo content only
permissions:
  contents: read

env:
  NODE_VERSION: "20"
  K6_CLIENT: "_reference"
  K6_ENV: "default"

jobs:

  # ── Step 1: Detect hardcoded secrets ──────────────────────────────────────
  detect-secrets:
    name: Scan for hardcoded secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --quiet
      - name: Run secrets scanner
        run: node bin/testing/detect-secrets.js

  # ── Step 2: Lint and type-check ───────────────────────────────────────────
  lint-and-build:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --quiet
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fad2513d2ddbe0b9a2e7  # v4.6.0
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Step 3: Smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Run k6 smoke test
    needs: [detect-secrets, lint-and-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --quiet

      - uses: actions/download-artifact@fa0a91b85d4f404e444fe0e60cff50a8e7459eb7  # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y -qq k6

      - name: Validate workflow inputs
        # T-140: Sanitize inputs from workflow_dispatch before use in shell
        run: |
          PROFILE="${{ inputs.profile || 'smoke' }}"
          SCENARIO="${{ inputs.scenario || 'api/smoke-users' }}"
          if [[ ! "${PROFILE}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "ERROR: Invalid profile input: ${PROFILE}" >&2
            exit 1
          fi
          if [[ ! "${SCENARIO}" =~ ^[a-zA-Z0-9_/.-]+$ ]]; then
            echo "ERROR: Invalid scenario input: ${SCENARIO}" >&2
            exit 1
          fi
          # Export validated values for subsequent steps
          echo "VALIDATED_PROFILE=${PROFILE}" >> "${GITHUB_ENV}"
          echo "VALIDATED_SCENARIO=${SCENARIO}" >> "${GITHUB_ENV}"

      - name: Run smoke test
        # Secrets are passed as environment variables, never as CLI arguments
        run: |
          ./bin/run-test.sh \
            --client "${K6_CLIENT}" \
            --scenario "${VALIDATED_SCENARIO}" \
            --profile "${VALIDATED_PROFILE}" \
            --env "${K6_ENV}"
        env:
          K6_SECRETS_BACKENDS: env
          # Application secrets: set in GitHub repository Settings > Secrets
          # Uncomment and configure as needed:
          # APP_API_KEY: ${{ secrets.APP_API_KEY }}
          # APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fad2513d2ddbe0b9a2e7  # v4.6.0
        with:
          name: k6-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7
