# perf-regression.yml — Nightly regression suite (scheduled)
#
# Trigger: cron schedule at 02:00 UTC every day + manual dispatch
#
# What it does:
#   1. Runs the configured regression suite for each client
#   2. Compares results against historical baseline (last 7 days)
#   3. Sends notifications if regressions are detected
#   4. Publishes consolidated report as artifact
#
# Secrets required:
#   PERF_SLACK_WEBHOOK   — Slack webhook for regression alerts
#   PERF_EMAIL_TO        — Email recipient for regression alerts
#
# To trigger via API:
#   curl -X POST \
#     -H "Authorization: token $GITHUB_PAT" \
#     https://api.github.com/repos/<owner>/<repo>/actions/workflows/perf-regression.yml/dispatches \
#     -d '{"ref":"main","inputs":{"client":"_reference","suite":"nightly","notify":"slack"}}'

name: Nightly Regression Suite

on:
  schedule:
    # 02:00 UTC daily
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      client:
        description: "Client name"
        required: true
        default: "_reference"
      suite:
        description: "Regression suite name"
        required: true
        default: "nightly"
      env:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      notify:
        description: "Notification channels"
        required: false
        default: "slack"
        type: choice
        options:
          - none
          - slack
          - email
          - slack,email

  # Allow calling from other workflows
  workflow_call:
    inputs:
      client:
        required: true
        type: string
      suite:
        required: false
        type: string
        default: "nightly"
      env:
        required: false
        type: string
        default: "staging"
    secrets:
      PERF_SLACK_WEBHOOK:
        required: false
      PERF_EMAIL_TO:
        required: false

concurrency:
  group: perf-regression-${{ github.event.inputs.client || '_reference' }}
  cancel-in-progress: false

jobs:
  regression:
    name: Regression — ${{ github.event.inputs.client || '_reference' }} / ${{ github.event.inputs.suite || 'nightly' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for baseline comparison
          fetch-depth: 0

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.54.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: k6-framework/package-lock.json

      - name: Install dependencies
        working-directory: k6-framework
        run: npm ci --prefer-offline

      - name: Build TypeScript
        working-directory: k6-framework
        run: npm run build

      - name: Run regression suite
        id: regression
        working-directory: k6-framework
        env:
          NOTIFY_SLACK_WEBHOOK: ${{ secrets.PERF_SLACK_WEBHOOK }}
          NOTIFY_EMAIL_TO: ${{ secrets.PERF_EMAIL_TO }}
        run: |
          CLIENT="${{ github.event.inputs.client || '_reference' }}"
          SUITE="${{ github.event.inputs.suite || 'nightly' }}"
          ENV="${{ github.event.inputs.env || 'staging' }}"
          NOTIFY="${{ github.event.inputs.notify || 'slack' }}"

          set +e
          bash bin/run-regression.sh \
            --suite="${SUITE}" \
            --client="${CLIENT}" \
            --env="${ENV}" \
            --notify="${NOTIFY}"
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "client=${CLIENT}" >> "$GITHUB_OUTPUT"
          echo "suite=${SUITE}" >> "$GITHUB_OUTPUT"

          case $EXIT_CODE in
            0)  echo "status=pass"     >> "$GITHUB_OUTPUT" ;;
            1)  echo "status=warn"     >> "$GITHUB_OUTPUT" ;;
            99) echo "status=critical" >> "$GITHUB_OUTPUT" ;;
            *)  echo "status=error"    >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ steps.regression.outputs.client }}-${{ steps.regression.outputs.suite }}-${{ github.run_id }}
          path: k6-framework/reports/${{ steps.regression.outputs.client }}/regression/
          retention-days: 90

      - name: Set job summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.regression.outputs.status }}';
            const exitCode = '${{ steps.regression.outputs.exit_code }}';
            const client = '${{ steps.regression.outputs.client }}';
            const suite = '${{ steps.regression.outputs.suite }}';

            const icon = { pass: '✅', warn: '⚠️', critical: '🔴', error: '❌' }[status] || '❓';
            const label = { pass: 'PASS', warn: 'SIGNIFICANT REGRESSIONS', critical: 'CRITICAL REGRESSIONS', error: 'ERROR' }[status] || 'UNKNOWN';

            const summary = `## ${icon} Nightly Regression — ${label}

            | Field     | Value |
            |---|---|
            | Client    | \`${client}\` |
            | Suite     | \`${suite}\` |
            | Exit code | \`${exitCode}\` |
            | Run       | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Report available as workflow artifact (retained 90 days).`;

            await core.summary.addRaw(summary).write();

      - name: Fail on critical regressions
        if: steps.regression.outputs.status == 'critical' || steps.regression.outputs.status == 'error'
        run: |
          echo "::error::Nightly regression suite: ${{ steps.regression.outputs.status }} (exit ${{ steps.regression.outputs.exit_code }})"
          exit 1
