# Anchors docs-site as its own pnpm workspace root so installs don't get
# captured by the ancestor pnpm-workspace.yaml at the monorepo root.
packages:
  - .

# Security overrides — force patched versions of vulnerable transitive deps
# (Dependabot alerts on the former package-lock.json).
overrides:
  ws: 8.21.0
  launch-editor: 2.14.1
  js-yaml: 4.2.0
  "@babel/core": 7.29.7
  serialize-javascript: 7.0.5
  uuid: 11.1.1
