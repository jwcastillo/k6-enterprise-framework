# k6 Enterprise Framework — Production overrides
#
# T-136 / T-146 / T-150: Production security and hardening
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required environment variables (set in shell or injected by your secrets manager):
#   GF_SECURITY_ADMIN_PASSWORD  — Grafana admin password (min 12 chars)
#   GF_SECURITY_SECRET_KEY      — Grafana session signing key (random 32+ chars)
#   REDIS_PASSWORD              — Redis AUTH password (recommended in production)
#
# Generate strong secrets:
#   export GF_SECURITY_ADMIN_PASSWORD="$(openssl rand -base64 24)"
#   export GF_SECURITY_SECRET_KEY="$(openssl rand -base64 32)"
#   export REDIS_PASSWORD="$(openssl rand -base64 20)"
#
# Using Docker secrets (Swarm/Compose with secrets support):
#   See docker-compose.secrets.yml for secrets-based configuration.

version: "3.9"

services:
  # ── Grafana (production hardening) ────────────────────────────────────────
  grafana:
    environment:
      # Disable anonymous access — authentication required in production
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_BASIC_ENABLED=true

      # Credentials — must come from environment or secrets manager, never hardcoded
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER is required in production}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required in production}
      - GF_SECURITY_SECRET_KEY=${GF_SECURITY_SECRET_KEY:?GF_SECURITY_SECRET_KEY is required in production}

      # Prevent self-registration
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false

      # Session security
      - GF_SESSION_COOKIE_SECURE=true
      - GF_SESSION_COOKIE_SAMESITE=strict

      # Preserve feature flags from base
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor

  # ── Prometheus (internal only in production) ───────────────────────────────
  prometheus:
    # Remove any host port binding from base — internal only
    ports: []
    expose:
      - "9090"

  # ── Loki (internal only in production) ────────────────────────────────────
  loki:
    ports: []
    expose:
      - "3100"

  # ── Tempo (internal only in production) ───────────────────────────────────
  tempo:
    ports: []
    expose:
      - "3200"
      - "4317"
      - "4318"

  # ── Redis (enforce password in production) ─────────────────────────────────
  redis:
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in production}
