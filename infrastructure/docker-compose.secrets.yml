# k6 Enterprise Framework — Docker Secrets example
#
# T-150: Demonstrates Docker secrets for sensitive configuration.
# Docker secrets are the recommended approach for production (Swarm/Compose v3.9+).
#
# Usage (Docker Swarm):
#   echo "supersecretpassword" | docker secret create grafana_admin_password -
#   echo "$(openssl rand -base64 32)" | docker secret create grafana_secret_key -
#   echo "$(openssl rand -base64 20)" | docker secret create redis_password -
#   docker stack deploy -c docker-compose.yml -c docker-compose.secrets.yml k6
#
# Usage (Docker Compose with external secrets):
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#   Note: Compose reads secrets from files, not Swarm manager.
#   Create files first:
#     mkdir -p secrets/
#     echo "mySecurePassword" > secrets/grafana_admin_password
#     openssl rand -base64 32 > secrets/grafana_secret_key
#     openssl rand -base64 20 > secrets/redis_password
#     chmod 600 secrets/*
#
# Alternatives to Docker secrets:
#   A) Environment variables from shell / CI/CD pipeline (recommended for compose without Swarm)
#   B) Vault / AWS Secrets Manager / Azure Key Vault via entrypoint wrapper
#   C) .env file (gitignored) — see .env.example, suitable for local dev only
#
# NEVER commit actual secret values to version control.

version: "3.9"

# ── Secret definitions ─────────────────────────────────────────────────────
# For Swarm: remove `file:` and use `external: true` after creating secrets with docker secret create
# For Compose: specify file paths to plaintext files (keep secrets/ in .gitignore)
secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password   # plaintext file, chmod 600
  grafana_secret_key:
    file: ./secrets/grafana_secret_key
  redis_password:
    file: ./secrets/redis_password

services:

  # ── Grafana with file-based secrets ───────────────────────────────────────
  grafana:
    secrets:
      - grafana_admin_password
      - grafana_secret_key
    environment:
      # Grafana supports __file suffix to read credentials from a secret file
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      # Read password from secret file mounted at /run/secrets/grafana_admin_password
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_SECURITY_SECRET_KEY__FILE=/run/secrets/grafana_secret_key
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_SESSION_COOKIE_SECURE=true
      - GF_SESSION_COOKIE_SAMESITE=strict
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor

  # ── Redis with file-based secret ──────────────────────────────────────────
  redis:
    secrets:
      - redis_password
    # Redis reads password from file via shell substitution in entrypoint
    entrypoint: >
      sh -c '
        REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
        exec redis-server
          --appendonly yes
          --maxmemory $${REDIS_MAXMEMORY:-512mb}
          --maxmemory-policy allkeys-lru
          --requirepass "$$REDIS_PASSWORD"
      '
