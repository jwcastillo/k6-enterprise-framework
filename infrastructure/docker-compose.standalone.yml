# k6 Framework — Standalone Observability Stack
#
# Adapted from the monorepo docker-compose.yml for standalone client repos.
# In standalone mode, k6 runs locally on the host (not in Docker) and pushes
# metrics to Prometheus via --out experimental-prometheus-rw.
#
# Usage:
#   docker compose -f infrastructure/docker-compose.standalone.yml up -d
#   docker compose -f infrastructure/docker-compose.standalone.yml --profile observability up -d
#   docker compose -f infrastructure/docker-compose.standalone.yml --profile observability down
#
# Configuration:
#   cp infrastructure/.env.standalone infrastructure/.env.standalone.local
#   docker compose --env-file infrastructure/.env.standalone.local -f ... up -d
#
# Ports exposed to host (default):
#   3000  — Grafana dashboards
#   9090  — Prometheus (exposed for k6 remote-write from host)
#
# k6 integration (run from host):
#   k6 run --out experimental-prometheus-rw \
#     -e K6_PROMETHEUS_RW_SERVER_URL=http://localhost:9090/api/v1/write \
#     dist/my-test.js

networks:
  k6-net:
    driver: bridge

volumes:
  grafana-data:
    name: k6-standalone-grafana
  prometheus-data:
    name: k6-standalone-prometheus
  loki-data:
    name: k6-standalone-loki
  tempo-data:
    name: k6-standalone-tempo
  pyroscope-data:
    name: k6-standalone-pyroscope

services:
  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.0.0}
    container_name: k6-grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - k6-net
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Exposed to host on port 9090 so that k6 running locally can push metrics
  # via --out experimental-prometheus-rw to http://localhost:9090/api/v1/write
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.51.0}
    container_name: k6-prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${RETENTION_DAYS:-30}d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus-standalone.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - k6-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki ───────────────────────────────────────────────────────────────────
  # Part of 'observability' profile — log aggregation.
  # Start with: docker compose --profile observability up -d
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.0.0}
    container_name: k6-loki
    profiles:
      - observability
    expose:
      - "3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - k6-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tempo ──────────────────────────────────────────────────────────────────
  # Part of 'observability' profile — distributed tracing via OTLP.
  tempo:
    image: grafana/tempo:${TEMPO_VERSION:-2.4.1}
    container_name: k6-tempo
    profiles:
      - observability
    expose:
      - "3200"
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - tempo-data:/var/tempo
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
    networks:
      - k6-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Pyroscope ──────────────────────────────────────────────────────────────
  # Part of 'observability' profile — continuous profiling.
  pyroscope:
    image: grafana/pyroscope:${PYROSCOPE_VERSION:-1.5.0}
    container_name: k6-pyroscope
    profiles:
      - observability
    expose:
      - "4040"
    networks:
      - k6-net
    volumes:
      - pyroscope-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4040/ready"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 3
