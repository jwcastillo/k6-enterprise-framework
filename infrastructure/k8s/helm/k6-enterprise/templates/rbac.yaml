{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.runner.serviceAccountName | quote }}
  namespace: {{ .Values.test.namespace | quote }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k6-runner
  namespace: {{ .Values.test.namespace | quote }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k6.io"]
    resources: ["testruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k6-runner
  namespace: {{ .Values.test.namespace | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.runner.serviceAccountName | quote }}
    namespace: {{ .Values.test.namespace | quote }}
roleRef:
  kind: Role
  name: k6-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
