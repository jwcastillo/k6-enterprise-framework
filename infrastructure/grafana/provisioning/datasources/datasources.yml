apiVersion: 1

# T-147: Pre-provisioned datasources for k6 Enterprise Framework.
# Prometheus is always available (core stack).
# Loki, Tempo, Pyroscope are only reachable when --profile observability is active.
# Grafana will show a "datasource unreachable" warning for unavailable services — this is expected.

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        - matcherRegex: '"trace_id":"([^"]+)"'
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        tags: [{ key: "client" }, { key: "environment" }]
      tracesToProfilesV2:
        datasourceUid: pyroscope
        tags:
          - { key: "service.name", value: "service_name" }
          - { key: "client" }
          - { key: "scenario" }
          - { key: "profile" }
          - { key: "run_id" }
        profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
        customQuery: false
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    url: http://pyroscope:4040
    access: proxy
