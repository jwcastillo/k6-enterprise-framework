global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "k6-enterprise-framework"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # k6 exposes metrics on port 5656 when K6_PROMETHEUS_RW_SERVER_URL is set
  - job_name: "k6-generator-health"
    static_configs:
      - targets: ["k6:5656"]
    honor_labels: true

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
